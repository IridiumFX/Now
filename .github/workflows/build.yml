name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DPICO_HTTP_TLS=OFF

      - name: Build
        run: cmake --build build --verbose

      - name: Test
        run: ./build/bin/now_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-linux
          path: |
            build/bin/libnow.so*
            build/bin/now
            build/bin/now_test

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DPICO_HTTP_TLS=OFF
          -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build build

      - name: Test
        run: ./build/bin/now_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-macos-arm64
          path: |
            build/bin/libnow*.dylib
            build/bin/now
            build/bin/now_test

  freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build & test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y cmake ninja
          run: |
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DPICO_HTTP_TLS=OFF
            cmake --build build
            ./build/bin/now_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-freebsd
          path: |
            build/bin/libnow.so*
            build/bin/now
            build/bin/now_test

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPICO_HTTP_TLS=OFF

      - name: Build
        run: cmake --build build --config Release --verbose

      - name: Test
        run: |
          $env:PATH = "$PWD\build\bin\Release;" + $env:PATH
          .\build\bin\Release\now_test.exe
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: now-windows
          path: |
            build/bin/Release/libnow.dll
            build/bin/Release/now.exe
            build/bin/Release/now_test.exe
            build/lib/Release/libnow.lib
